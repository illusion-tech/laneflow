name: 缺陷
description: 报告 LaneFlow 行为不正确的问题
title: "[缺陷]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 哪里不对？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - core-runtime
        - data-spec
        - adapter
        - authoring-tool
        - example
        - docs
        - governance
        - unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现？
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 日志、截图、示例数据、运行环境或失败测试。
    validations:
      required: false
