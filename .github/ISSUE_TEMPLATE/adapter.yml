name: 适配器
description: 请求或变更 Engine Adapter
title: "[适配器]: "
labels:
  - adapter
body:
  - type: dropdown
    id: engine
    attributes:
      label: 目标引擎
      options:
        - Unity
        - Unreal
        - Godot
        - O3DE
        - Web
        - 其他
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这个 Adapter 需要支持什么？
    validations:
      required: true
  - type: textarea
    id: core-boundary
    attributes:
      label: Core 边界
      description: 是否涉及 Core API 或 Adapter API 变更？
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 验证计划
      description: 应如何测试或演示？
      placeholder: |
        - [ ] 构建 Adapter
        - [ ] 运行示例场景
        - [ ] 验证 transform 同步
        - [ ] 验证调试可视化
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 相关文档 / ADR
      description: 链接 Adapter API、design 文档或 ADR。
    validations:
      required: false
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Delivery PR 未创建但预计需要 PR 时写 pending，创建后写 PR-number 并在 G3 前核验 closingIssuesReferences；Related PRs 逐条列出并使用 Refs 关联。确实无需 Delivery PR 或 Related PRs 时才写 N/A 原因；若只能手动关联 GitHub Development 面板，必须记录显式例外。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Delivery PR：pending / #<number> / N/A，原因：
        - Related PRs：#<number>, #<number> / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；G3 完整证据在 PR comment，Issue G3 Gate Ledger 增量回链 Related PR permalink，并在 Delivery PR 与全部 Related PR 完成后勾选；G4 完整证据在 Issue comment，Issue G4 checkbox 回链该 permalink。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 Delivery PR 的 G3 comment；Related PR 如有均逐条链接
        - [ ] G4 完成判断已记录：链接本 Issue 的 G4 comment
        <!-- G4 comment 模板（所有关联 PR 合并后、关闭 Issue 前发表）：
        ## G4 完成判断
        - 合并：
        - main CI：
        - 验收：
        - Project：
        - 关系：
        - 分支：
        - 权限 / bypass：
        - Gate 断言：
        -->
    validations:
      required: true
