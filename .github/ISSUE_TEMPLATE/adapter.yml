name: 适配器
description: 请求或变更 Engine Adapter
title: "[适配器]: "
labels:
  - adapter
body:
  - type: dropdown
    id: engine
    attributes:
      label: 目标引擎
      options:
        - Unity
        - Unreal
        - Godot
        - O3DE
        - Web
        - 其他
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这个 Adapter 需要支持什么？
    validations:
      required: true
  - type: textarea
    id: core-boundary
    attributes:
      label: Core 边界
      description: 是否涉及 Core API 或 Adapter API 变更？
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 验证计划
      description: 应如何测试或演示？
      placeholder: |
        - [ ] 构建 Adapter
        - [ ] 运行示例场景
        - [ ] 验证 transform 同步
        - [ ] 验证调试可视化
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 相关文档 / ADR
      description: 链接 Adapter API、design 文档或 ADR。
    validations:
      required: false
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Development PR 未创建但预计需要 PR 时写 pending，PR 创建后写 PR-number 并在 G3 前优先核验 closingIssuesReferences；若只能手动关联 GitHub Development 面板，必须记录显式例外。确实无需 PR 时才写 N/A 原因。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Development PR：pending / PR-number / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前在 PR 记录 G3 并在 Issue 勾选/链接，完成时在 Issue 回写 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 PR 中的 G3 判断
        - [ ] G4 完成判断已记录：回写合并后收口结果
    validations:
      required: true
