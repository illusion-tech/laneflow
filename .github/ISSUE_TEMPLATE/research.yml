name: 调研
description: 探索尚未纳入路线图的想法
title: "[调研]: "
labels:
  - research
body:
  - type: textarea
    id: question
    attributes:
      label: 调研问题
      description: 正在探索什么？为什么现在做？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 本次探索覆盖什么，明确不覆盖什么？
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 约束
      description: 相关约束，例如项目范围（ADR-0001）或依赖限制（ADR-0002）。
    validations:
      required: false
  - type: textarea
    id: outcome
    attributes:
      label: 预期产出
      description: 应产出什么决策或后续动作？
      placeholder: |
        - [ ] 功能 Issue
        - [ ] 设计 Issue / ADR
        - [ ] 放弃 / 不继续
    validations:
      required: true
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Delivery PR 未创建但预计需要 PR 时写 pending，创建后写 PR-number 并在 G3 前核验 closingIssuesReferences；Related PRs 逐条列出并使用 Refs 关联。确实无需 Delivery PR 或 Related PRs 时才写 N/A 原因；若只能手动关联 GitHub Development 面板，必须记录显式例外。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Delivery PR：pending / #<number> / N/A，原因：
        - Related PRs：#<number>, #<number> / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；G3 完整证据在 PR comment，Issue G3 checkbox 回链 Delivery PR 与 Related PR 的 permalink；G4 完整证据在 Issue comment，Issue G4 checkbox 回链该 permalink。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 Delivery PR 的 G3 comment；Related PR 如有均逐条链接
        - [ ] G4 完成判断已记录：链接本 Issue 的 G4 comment
        <!-- G4 comment 模板（所有关联 PR 合并后、关闭 Issue 前发表）：
        ## G4 完成判断
        - 合并：
        - main CI：
        - 验收：
        - Project：
        - 关系：
        - 分支：
        - 权限 / bypass：
        - Gate 断言：
        -->
    validations:
      required: true
