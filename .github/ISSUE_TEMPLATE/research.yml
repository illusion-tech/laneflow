name: 调研
description: 探索尚未纳入路线图的想法
title: "[调研]: "
labels:
  - research
body:
  - type: textarea
    id: question
    attributes:
      label: 调研问题
      description: 正在探索什么？为什么现在做？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 本次探索覆盖什么，明确不覆盖什么？
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 约束
      description: 相关约束，例如项目范围（ADR-0001）或依赖限制（ADR-0002）。
    validations:
      required: false
  - type: textarea
    id: outcome
    attributes:
      label: 预期产出
      description: 应产出什么决策或后续动作？
      placeholder: |
        - [ ] 功能 Issue
        - [ ] 设计 Issue / ADR
        - [ ] 放弃 / 不继续
    validations:
      required: true
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Development PR 未创建但预计需要 PR 时写 pending，确实无需 PR 时才写 N/A 原因。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Development PR：pending / PR-number / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前在 PR 记录 G3 并在 Issue 勾选/链接，完成时在 Issue 回写 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 PR 中的 G3 判断
        - [ ] G4 完成判断已记录：回写合并后收口结果
    validations:
      required: true
