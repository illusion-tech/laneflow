name: 文档
description: 文档或治理规范变更
title: "[文档]: "
labels:
  - docs
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 应新增或变更哪些文档或治理内容？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 文档领域
      options:
        - readme
        - architecture
        - roadmap
        - adr
        - design
        - governance
        - reference
        - agents-skills
        - other
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: 行为变更
      description: 确认是否改变运行时行为。若仅文档变更，请写“无”。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前补 G3，完成时补 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：
        - [ ] G4 完成判断已记录：
    validations:
      required: true
