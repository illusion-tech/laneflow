name: Core
description: 提出或变更 LaneFlow Core 运行时行为
title: "[Core]: "
labels:
  - core-runtime
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: Core 运行时行为应新增或变更什么？
    validations:
      required: true
  - type: dropdown
    id: subsystem
    attributes:
      label: 子系统
      options:
        - runtime-tick
        - vehicle-state
        - lane-graph
        - route-system
        - vehicle-following
        - signal-system
        - intersection-rules
        - parking-system
        - other
    validations:
      required: true
  - type: textarea
    id: api-impact
    attributes:
      label: Core API 影响
      description: 是否新增、变更或破坏 Core API？是否需要 ADR 或 design 文档？
    validations:
      required: true
  - type: textarea
    id: determinism
    attributes:
      label: 确定性 / 测试
      description: 如何保证确定性行为，以及如何验证？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 相关文档 / ADR
      description: 链接相关 design 文档、ADR，或说明需要新建哪些文档。
    validations:
      required: false
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Delivery PR 未创建但预计需要 PR 时写 pending，创建后写 PR-number 并在 G3 前核验 closingIssuesReferences；Related PRs 逐条列出并使用 Refs 关联。确实无需 Delivery PR 或 Related PRs 时才写 N/A 原因；若只能手动关联 GitHub Development 面板，必须记录显式例外。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Delivery PR：pending / #<number> / N/A，原因：
        - Related PRs：#<number>, #<number> / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；G3 完整证据在 PR comment，Issue G3 Gate Ledger 增量回链 Related PR permalink，并在 Delivery PR 与全部 Related PR 完成后勾选；G4 完整证据在 Issue comment，Issue G4 checkbox 回链该 permalink。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 Delivery PR 的 G3 comment；Related PR 如有均逐条链接
        - [ ] G4 完成判断已记录：链接本 Issue 的 G4 comment
        <!-- G4 comment 模板（所有关联 PR 合并后、关闭 Issue 前发表）：
        ## G4 完成判断
        - 合并：
        - main CI：
        - 验收：
        - Project：
        - 关系：
        - 分支：
        - 权限 / bypass：
        - Gate 断言：
        -->
    validations:
      required: true
