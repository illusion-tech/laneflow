name: 设计
description: 提出或完善 LaneFlow 设计
title: "[设计]: "
labels:
  - design
body:
  - type: textarea
    id: topic
    attributes:
      label: 设计议题
      description: 需要解决什么设计问题？
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: 影响领域
      options:
        - project-scope
        - core-api
        - runtime-tick
        - lane-graph
        - route-system
        - vehicle-following
        - signal-system
        - parking-system
        - data-format
        - adapter-api
        - release-process
        - other
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: 已考虑的方案
      description: 列出备选方案、权衡或未决问题。
    validations:
      required: false
  - type: textarea
    id: proposed
    attributes:
      label: 建议方向
      description: 你建议采用什么方向？
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: 预期产出
      description: 这应产出 ADR、design 文档更新，还是后续实现 Issue？
      placeholder: |
        - [ ] ADR
        - [ ] docs/design 更新
        - [ ] 后续实现 Issue
    validations:
      required: true
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Delivery PR 未创建但预计需要 PR 时写 pending，创建后写 PR-number 并在 G3 前核验 closingIssuesReferences；Related PRs 逐条列出并使用 Refs 关联。确实无需 Delivery PR 或 Related PRs 时才写 N/A 原因；若只能手动关联 GitHub Development 面板，必须记录显式例外。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Delivery PR：pending / #<number> / N/A，原因：
        - Related PRs：#<number>, #<number> / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；G3 完整证据在 PR comment，Issue G3 checkbox 回链 Delivery PR 与 Related PR 的 permalink；G4 完整证据在 Issue comment，Issue G4 checkbox 回链该 permalink。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 Delivery PR 的 G3 comment；Related PR 如有均逐条链接
        - [ ] G4 完成判断已记录：链接本 Issue 的 G4 comment
        <!-- G4 comment 模板（所有关联 PR 合并后、关闭 Issue 前发表）：
        ## G4 完成判断
        - 合并：
        - main CI：
        - 验收：
        - Project：
        - 关系：
        - 分支：
        - 权限 / bypass：
        - Gate 断言：
        -->
    validations:
      required: true
