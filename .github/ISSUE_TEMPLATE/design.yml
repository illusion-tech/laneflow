name: 设计
description: 提出或完善 LaneFlow 设计
title: "[设计]: "
labels:
  - design
body:
  - type: textarea
    id: topic
    attributes:
      label: 设计议题
      description: 需要解决什么设计问题？
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: 影响领域
      options:
        - project-scope
        - core-api
        - runtime-tick
        - lane-graph
        - route-system
        - vehicle-following
        - signal-system
        - parking-system
        - data-format
        - adapter-api
        - release-process
        - other
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: 已考虑的方案
      description: 列出备选方案、权衡或未决问题。
    validations:
      required: false
  - type: textarea
    id: proposed
    attributes:
      label: 建议方向
      description: 你建议采用什么方向？
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: 预期产出
      description: 这应产出 ADR、design 文档更新，还是后续实现 Issue？
      placeholder: |
        - [ ] ADR
        - [ ] docs/design 更新
        - [ ] 后续实现 Issue
    validations:
      required: true
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Development PR 未创建但预计需要 PR 时写 pending，PR 创建后写 PR-number 并在 G3 前优先核验 closingIssuesReferences；若只能手动关联 GitHub Development 面板，必须记录显式例外。确实无需 PR 时才写 N/A 原因。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Development PR：pending / PR-number / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前在 PR 记录 G3 并在 Issue 勾选/链接，完成时在 Issue 回写 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 PR 中的 G3 判断
        - [ ] G4 完成判断已记录：回写合并后收口结果
    validations:
      required: true
