name: 功能
description: 请求新增 LaneFlow 能力
title: "[功能]: "
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 这对应什么场景或用户需求？
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 完成后 LaneFlow 应支持什么？
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: 非目标
      description: 明确不在本次范围内的内容是什么？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - core-runtime
        - data-spec
        - adapter
        - authoring-tool
        - example
        - docs-only
        - governance
        - cross-layer
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 列出可验证、可检查的验收项。
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 相关文档 / ADR
      description: 链接相关 design 文档、ADR，或说明需要新建哪些文档。
    validations:
      required: false
  - type: textarea
    id: github-metadata
    attributes:
      label: GitHub 元数据 / 依赖关系审计
      description: 创建或接手 Issue 时必须审计 GitHub 侧边栏和关系字段；不适用项必须写明 N/A 原因。Development PR 未创建但预计需要 PR 时写 pending，确实无需 PR 时才写 N/A 原因。
      value: |
        - Project：
        - Project status：
        - Milestone：milestone-name / N/A，原因：
        - Labels：
        - Parent / sub-issues：issue-links / N/A，原因：
        - Blocked by：issue-links / N/A，原因：
        - Blocking：issue-links / N/A，原因：
        - Development PR：pending / PR-number / N/A，原因：
    validations:
      required: true
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前在 PR 记录 G3 并在 Issue 勾选/链接，完成时在 Issue 回写 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：链接 PR 中的 G3 判断
        - [ ] G4 完成判断已记录：回写合并后收口结果
    validations:
      required: true
