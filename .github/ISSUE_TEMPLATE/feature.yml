name: 功能
description: 请求新增 LaneFlow 能力
title: "[功能]: "
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 这对应什么场景或用户需求？
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 完成后 LaneFlow 应支持什么？
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: 非目标
      description: 明确不在本次范围内的内容是什么？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - core-runtime
        - data-spec
        - adapter
        - authoring-tool
        - example
        - docs-only
        - governance
        - cross-layer
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 列出可验证、可检查的验收项。
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: 相关文档 / ADR
      description: 链接相关 design 文档、ADR，或说明需要新建哪些文档。
    validations:
      required: false
  - type: textarea
    id: gate-ledger
    attributes:
      label: Gate Ledger
      description: 按任务推进增量维护；创建 Issue 时至少记录 G0，开工前补 G1/G2，合并前补 G3，完成时补 G4。
      value: |
        - [ ] G0 立项已记录：
        - [ ] G1 设计判断已记录：
        - [ ] G2 开工判断已记录：
        - [ ] G3 合并判断已记录：
        - [ ] G4 完成判断已记录：
    validations:
      required: true
