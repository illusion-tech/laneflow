name: Schema publication

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/schema-publication.yml"
      - "schemas/**"
      - "xtask/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build schema publication
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust MSRV toolchain
        shell: bash
        run: rustup toolchain install 1.96.0 --profile minimal

      - name: Check schema publication contract
        shell: bash
        run: cargo +1.96.0 run --locked -p xtask -- check-schema-publication-contract

      - name: Build schema publication site
        shell: bash
        run: cargo +1.96.0 run --locked -p xtask -- build-schema-publication target/schema-publication-site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: target/schema-publication-site

  deploy:
    name: Deploy schema publication
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  verify:
    name: Verify deployed canonical URLs
    needs: deploy
    permissions:
      contents: read
    uses: ./.github/workflows/schema-publication-monitor.yml
