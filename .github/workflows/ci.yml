name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance:
    name: Governance checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check required governance files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "AGENTS.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "deny.toml"
            ".githooks/commit-msg"
            ".github/dependabot.yml"
            ".github/workflows/ci.yml"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/config.yml"
            ".github/ISSUE_TEMPLATE/feature.yml"
            ".github/ISSUE_TEMPLATE/bug.yml"
            ".github/ISSUE_TEMPLATE/design.yml"
            ".github/ISSUE_TEMPLATE/adapter.yml"
            ".github/ISSUE_TEMPLATE/core.yml"
            ".github/ISSUE_TEMPLATE/data-spec.yml"
            ".github/ISSUE_TEMPLATE/docs.yml"
            ".github/ISSUE_TEMPLATE/research.yml"
            ".agents/README.md"
            ".agents/skills/laneflow-governance/SKILL.md"
            ".agents/skills/laneflow-development/SKILL.md"
            ".agents/skills/laneflow-core-design/SKILL.md"
            ".agents/skills/laneflow-adapter/SKILL.md"
            ".cursor/skills/laneflow-governance/SKILL.md"
            ".cursor/skills/laneflow-development/SKILL.md"
            ".cursor/skills/laneflow-core-design/SKILL.md"
            ".cursor/skills/laneflow-adapter/SKILL.md"
            "docs/README.md"
            "docs/architecture.md"
            "docs/roadmap.md"
            "docs/adr/README.md"
            "docs/adr/0001-project-scope.md"
            "docs/adr/0002-dependency-and-licensing-constraints.md"
            "docs/adr/0011-schema-identifier-and-publication-contract.md"
            "docs/design/README.md"
            "docs/governance/documentation-policy.md"
            "docs/governance/github-workflow.md"
            "docs/governance/development-gates.md"
            "docs/governance/agent-development-guide.md"
            "docs/governance/dependency-security.md"
            "docs/governance/security-scanning.md"
            "docs/reference/README.md"
            "docs/reference/commit-convention.md"
            "docs/reference/rust-code-style.md"
            "docs/reference/validation-matrix.md"
            "schemas/README.md"
            "schemas/publication.json"
            ".github/workflows/schema-publication.yml"
            ".github/workflows/schema-publication-monitor.yml"
            "xtask/Cargo.toml"
            "xtask/src/main.rs"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check markdown files are not empty
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            if [[ ! -s "$file" ]]; then
              echo "Markdown file is empty: $file"
              exit 1
            fi
          done < <(find README.md AGENTS.md CONTRIBUTING.md docs .github .agents .cursor -name '*.md' -type f)

      - name: Fetch base branch for commit message checks
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Install Rust MSRV toolchain for governance tools
        shell: bash
        run: rustup toolchain install 1.96.0 --profile minimal

      - name: Check commit messages
        shell: bash
        run: cargo +1.96.0 run --locked -p xtask -- check-commit-messages

      - name: Check schema publication contract
        shell: bash
        run: cargo +1.96.0 run --locked -p xtask -- check-schema-publication-contract

      - name: Build schema publication site
        shell: bash
        run: cargo +1.96.0 run --locked -p xtask -- build-schema-publication target/schema-publication-site
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust MSRV toolchain
        shell: bash
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt

      - name: Check Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustc +1.96.0 --version
          cargo +1.96.0 --version

      - name: Check formatting
        shell: bash
        run: cargo +1.96.0 fmt --all -- --check

      - name: Run workspace tests
        shell: bash
        run: cargo +1.96.0 test --workspace --locked

      - name: Run Parking allocation invariants serially
        shell: bash
        run: cargo +1.96.0 test -p laneflow-core --test parking_runtime_allocations --all-features --locked -- --ignored --test-threads=1

      - name: Run Parking lifecycle example
        shell: bash
        run: cargo +1.96.0 run -p laneflow-data --example parking_lifecycle --locked

      - name: Compile Core benchmarks
        shell: bash
        run: cargo +1.96.0 bench -p laneflow-core --benches --no-run --locked

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust MSRV toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0

      - name: Install cargo-deny 0.20.2
        shell: bash
        env:
          CARGO_DENY_SHA256: 9f12ed4c49936e09b48bf862b595cde2fe64fcbd9d74dfacac6131ca824c8d5f
          CARGO_DENY_VERSION: 0.20.2
        run: |
          set -euo pipefail

          archive="$RUNNER_TEMP/cargo-deny.tar.gz"
          extract_dir="$RUNNER_TEMP/cargo-deny-extract"
          curl --proto '=https' --tlsv1.2 --fail --show-error --location --retry 3 \
            "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            --output "$archive"
          echo "${CARGO_DENY_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$extract_dir"
          tar --extract --gzip --file "$archive" --directory "$extract_dir" --strip-components=1
          install -m 0755 "$extract_dir/cargo-deny" "$RUNNER_TEMP/cargo-deny"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Check advisories, licenses, bans, and sources
        shell: bash
        run: |
          set -euo pipefail
          cargo-deny --version
          cargo-deny --locked --all-features check advisories bans licenses sources
